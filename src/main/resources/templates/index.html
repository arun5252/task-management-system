<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Task Manager</title>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0ecff, #f4f7fb);
            min-height: 100vh;
            padding: 30px;
            color: #1f2937;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .header {
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            color: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.95;
        }

        .toolbar {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-box input {
            width: 280px;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }

        .search-box input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .btn {
            text-decoration: none;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-search {
            background: #1d4ed8;
            color: white;
        }

        .btn-search:hover {
            background: #1e40af;
        }

        .btn-add {
            background: #16a34a;
            color: white;
        }

        .btn-add:hover {
            background: #15803d;
        }

        .table-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        thead {
            background: #2563eb;
            color: white;
        }

        th, td {
            padding: 14px 12px;
            text-align: left;
        }

        tbody tr {
            border-bottom: 1px solid #e5e7eb;
            transition: 0.3s;
        }

        tbody tr:hover {
            background: #f8fbff;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-done {
            background: #dcfce7;
            color: #166534;
        }

        .status-progress {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .action-links a {
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            margin-right: 6px;
            display: inline-block;
        }

        .edit-btn {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .delete-btn {
            background: #fee2e2;
            color: #dc2626;
        }

        .empty-msg {
            text-align: center;
            padding: 30px;
            color: #6b7280;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Task Management System</h1>
        <p>Manage your daily tasks in a smart and simple way</p>
    </div>

    <div class="toolbar">
        <form class="search-box" th:action="@{/search}" method="get">
            <input type="text" name="keyword" placeholder="Search by title">
            <button type="submit" class="btn btn-search">Search</button>
        </form>

        <a th:href="@{/showNewTaskForm}" class="btn btn-add">+ Add New Task</a>
    </div>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Due Date</th>
                <th>Status</th>
                <th>Remarks</th>
                <th>Created By</th>
                <th>Updated By</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(listTasks)}">
                <td colspan="9" class="empty-msg">No tasks found. Add your first task.</td>
            </tr>
            <tr th:each="task : ${listTasks}">
                <td th:text="${task.id}"></td>
                <td th:text="${task.title}"></td>
                <td th:text="${task.description}"></td>
                <td th:text="${task.dueDate}"></td>
                <td>
                    <span th:if="${task.status == 'Pending'}" class="badge status-pending" th:text="${task.status}"></span>
                    <span th:if="${task.status == 'Done'}" class="badge status-done" th:text="${task.status}"></span>
                    <span th:if="${task.status == 'In Progress'}" class="badge status-progress" th:text="${task.status}"></span>
                    <span th:if="${task.status != 'Pending' and task.status != 'Done' and task.status != 'In Progress'}"
                          class="badge status-progress" th:text="${task.status}"></span>
                </td>
                <td th:text="${task.remarks}"></td>
                <td th:text="${task.createdByName}"></td>
                <td th:text="${task.updatedByName}"></td>
                <td class="action-links">
                    <a th:href="@{/showFormForUpdate/{id}(id=${task.id})}" class="edit-btn">Edit</a>
                    <a th:href="@{/deleteTask/{id}(id=${task.id})}" class="delete-btn"
                       onclick="return confirm('Are you sure you want to delete this task?')">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
